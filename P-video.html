<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>抖音视频库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        /* 🔥 核心：页面无高度限制，自然无限向下延伸 */
        body{
            padding:20px;
            background:#f7f8fa;
            font-family:微软雅黑;
            min-height:100vh;
            height:auto !important;
        }
        .main-title{text-align:center;margin:30px 0;color:#333;font-size:24px;}
        
        /* 分类容器：无高度限制，自动向下排列 */
        .folder-group{
            margin-bottom:40px;
            width:100%;
            height:auto;
        }
        .folder-title{
            background:#fff; padding:12px 15px; border-radius:8px;
            margin-bottom:15px; font-size:16px; font-weight:bold;
            border-left:4px solid #409eff; color:#333;
            width:100%;
        }

        /* 视频网格：自适应宽度，无限向下排列 */
        .video-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:18px;
            width:100%;
            height:auto;
        }

        .video-card{
            background:#fff; border-radius:10px; overflow:hidden;
            cursor:pointer; transition:0.3s; box-shadow:0 2px 8px rgba(0,0,0,0.05);
            height:auto;
        }
        .video-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,0.1);}
        /* 封面完整展示，无裁剪 */
        .video-cover{
            width:100%;
            height:160px;
            object-fit:contain;
            background:#000;
            display:block;
        }
        .video-info{padding:12px;}
        .video-name{font-size:14px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

        /* 播放弹窗：完全不变，保持最高层级 */
        .player-modal{
            position:fixed;inset:0;background:rgba(0,0,0,1);
            display:none;justify-content:center;align-items:center;
            z-index:99999;cursor:pointer;
        }
        .play-video{
            max-width:100vw;max-height:100vh;
            object-fit:contain;outline:none;
        }
        .close-btn{
            position:absolute;top:20px;right:30px;
            color:#fff;font-size:36px;z-index:100000;
            display:none;
        }
    </style>
</head>
<body>
    <h1 class="main-title">视频库</h1>
    <div id="app"></div>

    <div class="player-modal" id="modal" onclick="closeVideo()">
        <span class="close-btn" id="closeBtn" onclick="event.stopPropagation();closeVideo()">×</span>
        <video class="play-video" id="videoPlayer" onclick="event.stopPropagation();toggleControls()"></video>
    </div>

<script>
// ====================== 仅修改这里 → 可无限添加分类 ======================
const minioIp = "10.14.187.132";
const bucketName = "video";
const rootDir = "PIAN";

// 🔥 无限添加分类：想加多少加多少，页面自动无限向下延伸（数量为0则自动隐藏）
const config = {
    "裸舞": 15,
    "自慰": 15,
    "情侣": 15,
    "约炮": 15,
    "擦边": 15,
    "自拍": 15,
    "黑料": 30,
    "正常": 30,

    
    // 继续加...无限多都可以
};
// ======================================================================

const app = document.getElementById("app");
const modal = document.getElementById("modal");
const player = document.getElementById("videoPlayer");
const closeBtn = document.getElementById("closeBtn");
const baseUrl = `http://${minioIp}:9000/${bucketName}/${rootDir}/`;

// 检测视频文件是否存在（MinIO中）
async function checkVideoExists(url) {
    try {
        const response = await fetch(url, { method: 'HEAD' });
        return response.ok; // 状态码200-299则返回true
    } catch (error) {
        return false;
    }
}

// 渲染单个分类（仅当有有效视频时）
async function renderSingleCategory(dirName, count) {
    // 第一步：数量≤0直接跳过
    if (count <= 0) return;

    // 第二步：检测该分类下是否有至少一个有效视频
    let hasValidVideo = false;
    const validVideos = []; // 存储有效视频的信息
    
    for (let i = 1; i <= count; i++) {
        const fileName = `${i}.mp4`;
        const fullPath = `${dirName}/${fileName}`;
        const videoUrl = baseUrl + fullPath;
        
        // 检测视频是否存在
        const exists = await checkVideoExists(videoUrl);
        if (exists) {
            hasValidVideo = true;
            validVideos.push({
                url: videoUrl,
                name: `${dirName}${i}.mp4`
            });
        }
    }

    // 无有效视频则跳过渲染
    if (!hasValidVideo) return;

    // 有有效视频则渲染分类
    const group = document.createElement("div");
    group.className = "folder-group";
    group.innerHTML = `<div class="folder-title">📂 ${dirName}</div>`;

    // 创建视频网格
    const grid = document.createElement("div");
    grid.className = "video-grid";
    group.appendChild(grid);

    // 只渲染有效视频
    validVideos.forEach(video => {
        createVideoCard(grid, video.url, video.name);
    });

    app.appendChild(group);
}

// 渲染所有分类：自动隐藏无视频的分类
async function renderAll() {
    // 清空容器（避免重复渲染）
    app.innerHTML = "";
    
    // 遍历所有配置的分类（异步渲染）
    for (let dirName in config) {
        const count = config[dirName];
        await renderSingleCategory(dirName, count);
    }
}

// 创建视频卡片（逻辑对齐video.html）
function createVideoCard(container, url, name) {
    const card = document.createElement("div");
    card.className = "video-card";
    const id = "cover_" + Math.random().toString(36);
    
    card.innerHTML = `
        <img class="video-cover" id="${id}" alt="封面">
        <div class="video-info"><div class="video-name">${name}</div></div>
    `;

    // 生成封面
    const v = document.createElement("video");
    v.src = url;v.crossOrigin="anonymous";v.currentTime=2.2;
    v.onloadeddata=()=>{
        const canvas=document.createElement("canvas");
        canvas.width=v.videoWidth;canvas.height=v.videoHeight;
        canvas.getContext("2d").drawImage(v,0,0);
        document.getElementById(id).src=canvas.toDataURL("image/jpeg");
    };

    // 点击播放（对齐video.html的音量、循环配置）
    card.onclick = () => {
        player.src = url;
        // 1. 设置默认音量为10%
        player.volume = 0.1;
        // 2. 设置视频自动循环播放
        player.loop = true;
        modal.style.display = "flex";
        player.controls = false;
        closeBtn.style.display = "none";
        player.play();
    };

    container.appendChild(card);
}

// 切换控件显示/隐藏（对齐video.html的切换逻辑）
function toggleControls() {
    player.controls = !player.controls;
    closeBtn.style.display = player.controls ? "block" : "none";
}

// 关闭播放
function closeVideo() {
    modal.style.display = "none";
    player.pause();
    player.src = "";
    player.controls = false;
    closeBtn.style.display = "none";
}

// 初始化渲染（异步执行）
renderAll();
</script>
</body>
</html>
